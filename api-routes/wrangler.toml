name = "svglapi"
main = "src/index.ts"
minify = true
compatibility_date = "2023-12-01"

[[unsafe.bindings]]
name = "SVGL_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 10 }

# Run `wrangler kv namespace create SVGL_RATE_LIMIT_LOCKS` and put the
# generated id below to enable the 5-minute lockout after a 429.
[[kv_namespaces]]
binding = "SVGL_RATE_LIMIT_LOCKS"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

